<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CascadeBan Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar__brand">
          <div class="logo-icon">🔗</div>
          <div>
            <p class="eyebrow">MODERATOR DASHBOARD</p>
            <h1>CascadeBan</h1>
            <p class="subhead">r/<span id="subredditName">loading</span></p>
          </div>
        </div>
        <button id="refreshButton" class="button button--danger-outline" type="button">Refresh</button>
      </header>

      <div class="dashboard-grid">
        <!-- Left Sidebar: Metrics & Request Link -->
        <aside class="sidebar sidebar--left">
          <section class="panel metrics-panel">
            <div class="metric metric--linked">
              <span class="metric__label">LINKED</span>
              <strong id="linkedCount" class="metric__value metric__value--danger">0</strong>
            </div>
            <div class="metric metric--pending">
              <span class="metric__label">PENDING LINKS</span>
              <strong id="pendingLinksCount" class="metric__value">0</strong>
            </div>
            <div class="metric metric--requests">
              <span class="metric__label">PENDING ACTIONS</span>
              <strong id="pendingRequestsCount" class="metric__value">0</strong>
            </div>
            <div class="metric metric--failed">
              <span class="metric__label">FAILED</span>
              <strong id="failedRequestsCount" class="metric__value metric__value--danger">0</strong>
            </div>
          </section>

          <section class="panel link-panel">
            <div class="panel__header">
              <h2>Request Link</h2>
            </div>
            <div class="panel__content">
              <form id="linkForm" class="request-form">
                <input
                  id="linkInput"
                  type="text"
                  placeholder="r/partnerSubreddit"
                  autocomplete="off"
                />
                <button class="button button--primary" type="submit">Request Link</button>
              </form>
            </div>
          </section>

          <button id="openLinksButton" class="button button--secondary button--full" type="button">
            Manage Subreddit Links
          </button>
        </aside>

        <!-- Center: Cascade Requests -->
        <section class="panel main-panel">
          <div class="panel__header">
            <h2>Cascade requests</h2>
            <div class="segments" role="group" aria-label="Request filter">
              <button class="segment segment--active" id="pendingFilter" type="button">
                Pending
              </button>
              <button class="segment" id="allFilter" type="button">All</button>
            </div>
          </div>
          <div id="requestList" class="list" aria-live="polite"></div>
        </section>

        <!-- Right Sidebar: Activity -->
        <aside class="sidebar sidebar--right">
          <section class="panel audit-panel">
            <div class="panel__header">
              <h2>Activity</h2>
            </div>
            <div id="auditList" class="audit-list" aria-live="polite"></div>
          </section>
        </aside>
      </div>

      <!-- Modal for Subreddit Links -->
      <dialog id="linkDialog" class="modal" aria-labelledby="linkDialogTitle">
        <div class="modal__header">
          <h2 id="linkDialogTitle">Subreddit Links List</h2>
          <button
            id="closeLinksButton"
            class="button button--icon"
            type="button"
            aria-label="Close subreddit links list"
          >
            ✕
          </button>
        </div>
        <div class="modal__search">
          <input type="text" placeholder="🔍 Search" aria-label="Search links" />
        </div>
        <div id="linkList" class="list modal__list" aria-live="polite"></div>
      </dialog>

      <p id="statusLine" class="status">Loading dashboard data...</p>
    </main>
  </body>
</html>
